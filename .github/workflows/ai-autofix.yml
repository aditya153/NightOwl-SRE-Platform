name: AI Autofix Pipeline

on:
  workflow_run:
    workflows: ["NightOwl CI", "PR Tests"]
    types:
      - completed

jobs:
  auto-fix:
    name: Generate Autonomous Fix
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download log artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id
            });
            // Try formatting recent errors into a file via logs API if no artifact
            // As a fallback, we grab jobs directly
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id
            });
            const failedJobs = jobs.data.jobs.filter(j => j.conclusion === 'failure');
            const fs = require('fs');
            
            let logSummary = "Workflow failed jobs:\n";
            for (const job of failedJobs) {
               logSummary += "Job: " + job.name + "\n";
            }
            fs.writeFileSync('ci-failure.log', logSummary);

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Autofix Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          pip install -r services/agent-gateway/requirements.txt
          export CI_ERROR_LOGS=$(cat ci-failure.log)
          python scripts/autofix.py

      - name: Create Pull Request with Fix
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(ai): Autonomous resolution for CI failure"
          title: "🤖 Autonomous AI Fix: Broken CI Pipeline"
          body: |
            ## AI-Generated Remediation
            The CI pipeline failed on a recent commit. NightOwl's Autonomous Fixer intercepted the error, cross-referenced the failure with the OWASP Safety Engine, and generated this fix.
            
            **Safety Checks Performed:**
            ✅ OWASP Safety Rules
            ✅ No privilege escalation
            ✅ No risky DB operations
            
            Please review the proposed fix before merging.
          branch: "ai-autofix-${{ github.event.workflow_run.id }}"
          labels: "autofix, ai"
