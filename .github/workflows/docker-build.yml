name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "docker-compose.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/**"
      - "docker-compose.yml"

jobs:
  build-agent-gateway:
    name: Build Agent Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./services/agent-gateway
          push: false
          tags: nightowl-agent-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard
        uses: docker/build-push-action@v6
        with:
          context: ./services/dashboard
          push: false
          tags: nightowl-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-event-dispatcher:
    name: Build Event Dispatcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build event-dispatcher
        uses: docker/build-push-action@v6
        with:
          context: ./services/event-dispatcher
          push: false
          tags: nightowl-event-dispatcher:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-validation:
    name: Compose Validation
    runs-on: ubuntu-latest
    needs: [build-agent-gateway, build-dashboard, build-event-dispatcher]
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
