name: NightOwl CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flake8
        run: pip install flake8

      - name: Lint agent-gateway
        run: |
          flake8 services/agent-gateway/ --config services/agent-gateway/.flake8 > ci-failure.log || true
          if [ -s ci-failure.log ]; then cat ci-failure.log && exit 1; fi

      - name: Upload agent-gateway lint failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-log
          path: ci-failure.log

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dashboard dependencies
        working-directory: services/dashboard
        run: npm ci

      - name: Lint dashboard
        working-directory: services/dashboard
        run: npx eslint .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent-gateway dependencies
        working-directory: services/agent-gateway
        run: pip install -r requirements.txt && pip install pytest

      - name: Run agent-gateway tests
        working-directory: services/agent-gateway
        run: pytest --tb=short -q || true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dashboard dependencies
        working-directory: services/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: services/dashboard
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build agent-gateway image
        run: docker build -t nightowl-agent-gateway:ci ./services/agent-gateway

      - name: Build dashboard image
        run: docker build -t nightowl-dashboard:ci ./services/dashboard

      - name: Build event-dispatcher image
        run: docker build -t nightowl-event-dispatcher:ci ./services/event-dispatcher
